name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: triba/
          exclude: |
            .git/**
            .github/**
            .astro/**
            .tmp-check/**
            node_modules/**
            *.ps1
            *.md
            scripts/**
            supabase/**
            figma-web-triba.pdf
            marca-triba.pdf
            Instrucciones.md
